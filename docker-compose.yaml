services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    container_name: warehouse-db
    restart: always
    environment:
      MYSQL_DATABASE: warehouse_go
      MYSQL_ROOT_PASSWORD: "rootpassword"
    ports:
      - "3306:3306"
    volumes:
      - ./scripts:/docker-entrypoint-initdb.d # Otomatis eksekusi SQL saat startup
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:8-alpine
    container_name: warehouse_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Data tetap aman meski container dihapus
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: warehouse-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      REDIS_ADDRESS: redis:6379
      ENABLE_LOW_STOCK_ALERT: "true"
      LOW_STOCK_ALERT_EMAIL: "admin@warehouse.com"
      AUDIT_SERVICE_URL: "localhost:50051"
      JWT_SECRET: "rahasia-super-aman"
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: "rootpassword"
      DB_NAME: warehouse_go
      API_PORT: 8080
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
volumes:
  redis_data: